repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.0   # pin to latest stable; check github.com/antonbabenko/pre-commit-terraform/releases
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
      - id: terraform_trivy  # tfsec is deprecated; trivy absorbed it

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: detect-private-key   # catches accidentally staged SA keys
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
